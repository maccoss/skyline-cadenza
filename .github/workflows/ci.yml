name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Opt the JavaScript-based actions into Node.js 24. As of 2026-06-16,
# actions/setup-dotnet@v4 still ships against Node 20, which GitHub is
# deprecating; setting this flag is the documented way to upgrade
# without waiting for the upstream action to be republished.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build + Test (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore SkylineCadenza.sln

      - name: Build (Debug)
        run: dotnet build SkylineCadenza.sln --no-restore --configuration Debug

      - name: Test
        run: dotnet test SkylineCadenza.sln --no-build --configuration Debug --logger "console;verbosity=normal"

      - name: Build (Release)
        run: dotnet build SkylineCadenza.sln --configuration Release

      - name: Package SkylineCadenza.zip
        run: dotnet msbuild build/package.proj

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SkylineCadenza-zip
          path: publish/SkylineCadenza.zip
          if-no-files-found: error
